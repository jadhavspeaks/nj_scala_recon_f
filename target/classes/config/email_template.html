<html>
<body>
  <h2>Reconciliation Report for ${jobName}</h2>
  <table border="1">
    <tr>
      <td>Job Name</td>
      <td>${jobName}</td>
    </tr>
    <tr>
      <td>Status</td>
      <td style="color:${statusColor};">${status}</td>
    </tr>
    <tr>
      <td>Mismatch Count</td>
      <td>${mismatchCount}</td>
    </tr>
    <tr>
      <td>Total Time (seconds)</td>
      <td>${totalTime}</td>
    </tr>
  </table>
</body>
</html>
